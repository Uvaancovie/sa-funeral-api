openapi: 3.0.3
info:
  title: SA Funeral Supplies API
  version: v1
  description: Contract schema for core API endpoints.
servers:
  - url: http://localhost:5000
paths:
  /api/orders:
    post:
      summary: Place a new order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceOrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/orders/my:
    get:
      summary: Get current customer's orders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        '401':
          description: Unauthorized
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    PlaceOrderRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemRequest'
        notes:
          type: string
          nullable: true
    OrderItemRequest:
      type: object
      required:
        - productId
        - productName
        - variant
        - quantity
      properties:
        productId:
          type: string
        productName:
          type: string
        variant:
          type: string
        quantity:
          type: integer
          minimum: 1
    Order:
      type: object
      properties:
        orderId:
          type: integer
        customerId:
          type: integer
        customerEmail:
          type: string
        customerCompany:
          type: string
          nullable: true
        customerContact:
          type: string
          nullable: true
        items:
          type: string
        status:
          type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
